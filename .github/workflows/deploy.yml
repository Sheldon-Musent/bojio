name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from the Actions tab

# Required for the deploy-pages action to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time. cancel-in-progress: false means a running
# deployment finishes before the next one starts — avoids half-deployed states.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # js/config.js is gitignored so it is never in the repo.
      # We generate it here at deploy time using secrets from GitHub Settings
      # → Secrets and variables → Actions.
      # Passing secrets through env: ensures GitHub's log masking applies
      # and values never appear in plain text in the run logs.
      - name: Inject secrets into js/config.js
        env:
          MAPBOX_TOKEN:      ${{ secrets.MAPBOX_TOKEN }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          {
            echo "// config.js — Generated by CI. Do not commit manually."
            echo "const CONFIG = {"
            echo "  mapboxToken:     '${MAPBOX_TOKEN}',"
            echo "  supabaseUrl:     '${SUPABASE_URL}',"
            echo "  supabaseAnonKey: '${SUPABASE_ANON_KEY}',"
            echo "};"
          } > js/config.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # Uploads the full repo (including the generated config.js) as a Pages artifact
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
