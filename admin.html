<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOJIO Admin</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-body">

  <!-- ─── Login panel — visible until a session exists ─────────────────────── -->
  <div id="login-panel">
    <div id="login-card">
      <div id="login-logo">BOJIO</div>
      <div id="login-sub">admin access only</div>

      <form id="login-form" novalidate>
        <input
          type="email"
          id="login-email"
          placeholder="Email"
          autocomplete="email"
          required
        />
        <input
          type="password"
          id="login-password"
          placeholder="Password"
          autocomplete="current-password"
          required
        />
        <button type="submit" id="login-btn">Sign In</button>
      </form>

      <p id="login-error" class="msg-error hidden"></p>
    </div>
  </div>

  <!-- ─── Admin panel — hidden until login succeeds ────────────────────────── -->
  <div id="admin-panel" class="hidden">

    <header id="admin-header">
      <span id="admin-logo">BOJIO <span id="admin-badge">admin</span></span>
      <button id="logout-btn">Logout</button>
    </header>

    <main id="admin-main">
      <h2 class="section-title">Add Pin</h2>

      <form id="pin-form" novalidate>

        <label for="pin-name">Name</label>
        <input type="text" id="pin-name" placeholder="Place name" required />

        <label for="pin-description">Description</label>
        <textarea
          id="pin-description"
          placeholder="One-liner in Manglish tone"
          rows="3"
        ></textarea>

        <div class="form-row">
          <div class="form-group">
            <label for="pin-lat">Latitude</label>
            <input type="number" id="pin-lat" placeholder="3.0548" step="any" required />
          </div>
          <div class="form-group">
            <label for="pin-lng">Longitude</label>
            <input type="number" id="pin-lng" placeholder="101.7899" step="any" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="pin-area">Area</label>
            <select id="pin-area">
              <option value="">Select area</option>
              <option value="Kajang">Kajang</option>
              <option value="KL">KL</option>
              <option value="Ampang">Ampang</option>
            </select>
          </div>
          <div class="form-group">
            <label for="pin-trust">Trust Level</label>
            <select id="pin-trust">
              <option value="friend">friend</option>
              <option value="verified">verified</option>
            </select>
          </div>
        </div>

        <button type="submit" id="pin-submit-btn">Add Pin</button>
      </form>

      <p id="pin-success" class="msg-success hidden"></p>
      <p id="pin-error"   class="msg-error hidden"></p>

    </main>
  </div>

  <!-- Supabase CDN — must load before auth.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
