<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOJIO</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Control bar — layer pills (scrollable) + action buttons (appended by map.js) -->
  <div id="control-bar">
    <div id="layer-pills-wrapper">
    <div id="layer-pills">
      <button class="layer-pill active" data-layer="food">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
        </svg>
        Food
      </button>
      <button class="layer-pill disabled" data-layer="news">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18h-5"/><path d="M18 14h-8"/><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-4 0v-9a2 2 0 0 1 2-2h2"/><rect width="8" height="4" x="10" y="6" rx="1"/>
        </svg>
        News
      </button>
      <button class="layer-pill disabled" data-layer="social">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><path d="M16 3.128a4 4 0 0 1 0 7.744"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/>
        </svg>
        Social
      </button>
      <button class="layer-pill disabled" data-layer="events">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>
        </svg>
        Events
      </button>
    </div>
    </div>
  </div>

  <div id="map"></div>

  <!-- Nearby panel — slides up once pins load, overlays bottom 40% of map -->
  <div id="nearby-panel">
    <div id="nearby-handle"></div>
    <div id="nearby-header">Nearby Food</div>
    <div id="nearby-list">
      <p id="nearby-loading">Loading...</p>
    </div>
  </div>

  <!-- Mapbox GL JS — must load before map.js -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <!-- Supabase JS — must load before pins.js and tracking.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- App scripts — order: config → layers → pins → map → tracking -->
  <script src="js/config.js"></script>
  <script src="js/layers.js"></script>
  <script src="js/pins.js"></script>
  <script src="js/map.js"></script>
  <script src="js/tracking.js"></script>

</body>
</html>
