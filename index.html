<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOJIO</title>

  <!-- Leaflet CSS — must load before Leaflet JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header id="header">
    <span id="logo">BOJIO</span>
    <span id="tagline">didn't invite you? find it yourself.</span>
  </header>

  <div id="map"></div>

  <!-- Leaflet JS — must load before map.js -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Supabase JS — must load before pins.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- App scripts — order matters: config and pins before map.js so window.loadPins exists when map boots -->
  <script src="js/config.js"></script>
  <script src="js/layers.js"></script>
  <script src="js/pins.js"></script>
  <script src="js/map.js"></script>
  <script src="js/tracking.js"></script>

</body>
</html>
