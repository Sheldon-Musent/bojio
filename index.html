<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOJIO</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Control bar — layer pills (scrollable) + action buttons (appended by map.js) -->
  <div id="control-bar">
    <div id="layer-pills">
      <button class="layer-pill active"   data-layer="food">Food</button>
      <button class="layer-pill disabled" data-layer="news">News</button>
      <button class="layer-pill disabled" data-layer="social">Social</button>
      <button class="layer-pill disabled" data-layer="events">Events</button>
    </div>
  </div>

  <div id="map"></div>

  <!-- Nearby panel — slides up once pins load, overlays bottom 40% of map -->
  <div id="nearby-panel">
    <div id="nearby-handle"></div>
    <div id="nearby-header">Nearby Food</div>
    <div id="nearby-list">
      <p id="nearby-loading">Loading...</p>
    </div>
  </div>

  <!-- Mapbox GL JS — must load before map.js -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <!-- Supabase JS — must load before pins.js and tracking.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- App scripts — order: config → layers → pins → map → tracking -->
  <script src="js/config.js"></script>
  <script src="js/layers.js"></script>
  <script src="js/pins.js"></script>
  <script src="js/map.js"></script>
  <script src="js/tracking.js"></script>

</body>
</html>
